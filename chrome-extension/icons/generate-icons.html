<!DOCTYPE html>
<html>
<head>
<title>Icon Generator for Kleinanzeigen Sync Extension</title>
</head>
<body>
<h2>Extension Icon Generator</h2>
<p>Right-click each canvas below and "Save image as..." to create the icon files:</p>
<p>Save as: icon16.png, icon48.png, icon128.png</p>

<canvas id="c16" width="16" height="16" style="border:1px solid #ccc; zoom:4"></canvas>
<canvas id="c48" width="48" height="48" style="border:1px solid #ccc; zoom:2"></canvas>
<canvas id="c128" width="128" height="128" style="border:1px solid #ccc"></canvas>

<script>
function drawIcon(canvas) {
  const ctx = canvas.getContext('2d');
  const s = canvas.width;
  
  // Background - brand green
  ctx.fillStyle = '#86B817';
  ctx.beginPath();
  ctx.roundRect(0, 0, s, s, s * 0.15);
  ctx.fill();
  
  // Lightning bolt
  ctx.fillStyle = 'white';
  ctx.beginPath();
  const cx = s / 2;
  const cy = s / 2;
  const boltW = s * 0.25;
  const boltH = s * 0.6;
  
  ctx.moveTo(cx - boltW * 0.3, cy - boltH / 2);
  ctx.lineTo(cx + boltW * 0.5, cy - boltH / 2);
  ctx.lineTo(cx - boltW * 0.1, cy + boltH * 0.05);
  ctx.lineTo(cx + boltW * 0.3, cy + boltH * 0.05);
  ctx.lineTo(cx - boltW * 0.5, cy + boltH / 2);
  ctx.lineTo(cx + boltW * 0.1, cy - boltH * 0.05);
  ctx.lineTo(cx - boltW * 0.3, cy - boltH * 0.05);
  ctx.closePath();
  ctx.fill();
}

drawIcon(document.getElementById('c16'));
drawIcon(document.getElementById('c48'));
drawIcon(document.getElementById('c128'));
</script>
</body>
</html>
